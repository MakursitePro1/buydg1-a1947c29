name: Build cPanel ZIP (No Terminal)

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Copy .htaccess into dist
        run: |
          if [ -f public/.htaccess ]; then
            cp public/.htaccess dist/.htaccess
          fi

      - name: Create website-ready zip
        run: |
          cd dist
          zip -r ../website-ready.zip .

      - name: Upload downloadable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: website-ready
          path: website-ready.zip
          retention-days: 30
